{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentCMS</title>
    <link rel="stylesheet" href="{% static 'cms/style.css' %}">
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <a href="/" class="brand">AgentCMS</a>
        <nav class="nav">
          {% for p in menu_pages %}
            <a class="nav-link" href="/{{ p.slug }}/">{{ p.title }}</a>
          {% endfor %}
        </nav>
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      <small>Local dev</small>
    </footer>
  </body>
</html>
