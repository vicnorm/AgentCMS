{% extends "cms/base.html" %}

{% block content %}
  <h1>{{ page.title }}</h1>
  {% if page.image %}
    <figure>
      <img src="{{ page.image.url }}" alt="{{ page.image_alt_text|default:page.title }}">
    </figure>
  {% endif %}
  <div class="content">{{ page.body|linebreaks }}</div>
{% endblock %}
